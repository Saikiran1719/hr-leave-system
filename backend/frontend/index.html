<!-- Toast container -->
<div id="toast-container"></div>

<!-- App root — JS renders into here -->
<div id="app"></div>

<!-- Modals (shared) -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <span class="modal-title" id="confirm-title">Confirm</span>
      <button class="modal-close" onclick="closeModal('modal-confirm')">✕</button>
    </div>
    <p id="confirm-message" style="color:var(--text2);margin-bottom:4px"></p>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-confirm')">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>
